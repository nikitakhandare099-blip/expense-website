<!DOCTYPE html>
<html>
<head>
<title>Daily Expense Report System</title>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    text-align: center;
}

.container {
    width: 85%;
    margin: auto;
    background: white;
    padding: 20px;
    margin-top: 30px;
    border-radius: 10px;
    box-shadow: 0 0 10px gray;
}

input, button {
    padding: 8px;
    margin: 5px;
}

button {
    background: green;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background: darkgreen;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

table, th, td {
    border: 1px solid black;
    padding: 8px;
}

th {
    background-color: #333;
    color: white;
}

.delete-btn {
    background: red;
}

.report {
    margin-top: 15px;
    font-weight: bold;
    color: blue;
}

/* 🔵 New Report Section Styling */
.report-section {
    margin-top: 30px;
    padding: 15px;
    background-color: #eef2ff;
    border-radius: 10px;
}

.report-section h3 {
    color: #333;
}

.report-box {
    margin-top: 10px;
    font-size: 18px;
    color: darkblue;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>Daily Expense Report System</h1>

    <input type="date" id="date">
    <input type="text" id="category" placeholder="Category">
    <input type="text" id="description" placeholder="Description">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="addExpense()">Add Expense</button>

    <h2>All Expenses</h2>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Category</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="expenseTable"></tbody>
    </table>

    <div class="report" id="totalReport"></div>

    <!-- 🔵 Monthly & Yearly Section -->
    <div class="report-section">
        <h3>Monthly & Yearly Reports</h3>

        <div>
            <label>Select Month:</label>
            <input type="month" id="monthFilter">
            <button onclick="calculateMonthly()">Monthly Total</button>
        </div>

        <div>
            <label>Select Year:</label>
            <input type="number" id="yearFilter" placeholder="Enter Year">
            <button onclick="calculateYearly()">Yearly Total</button>
        </div>

        <div class="report-box" id="monthlyReport"></div>
        <div class="report-box" id="yearlyReport"></div>
    </div>

</div>

<script>
let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

function saveExpenses() {
    localStorage.setItem("expenses", JSON.stringify(expenses));
}

function addExpense() {
    const date = document.getElementById("date").value;
    const category = document.getElementById("category").value;
    const description = document.getElementById("description").value;
    const amount = document.getElementById("amount").value;

    if (!date || !category || !amount) {
        alert("Please fill required fields!");
        return;
    }

    const expense = {
        date,
        category,
        description,
        amount: parseFloat(amount)
    };

    expenses.push(expense);
    saveExpenses();
    displayExpenses();
    clearFields();
}

function displayExpenses() {
    const table = document.getElementById("expenseTable");
    table.innerHTML = "";

    let total = 0;

    expenses.forEach((expense, index) => {
        total += expense.amount;

        table.innerHTML += `
            <tr>
                <td>${expense.date}</td>
                <td>${expense.category}</td>
                <td>${expense.description}</td>
                <td>₹ ${expense.amount}</td>
                <td>
                    <button class="delete-btn" onclick="deleteExpense(${index})">
                        Delete
                    </button>
                </td>
            </tr>
        `;
    });

    document.getElementById("totalReport").innerHTML =
        "Total Expense: ₹ " + total;
}

function deleteExpense(index) {
    expenses.splice(index, 1);
    saveExpenses();
    displayExpenses();
}

function calculateMonthly() {
    const selectedMonth = document.getElementById("monthFilter").value;
    if (!selectedMonth) {
        alert("Select month!");
        return;
    }

    let total = 0;
    expenses.forEach(expense => {
        if (expense.date.startsWith(selectedMonth)) {
            total += expense.amount;
        }
    });

    document.getElementById("monthlyReport").innerHTML =
        "Monthly Expense: ₹ " + total;
}

function calculateYearly() {
    const selectedYear = document.getElementById("yearFilter").value;
    if (!selectedYear) {
        alert("Enter year!");
        return;
    }

    let total = 0;
    expenses.forEach(expense => {
        if (expense.date.startsWith(selectedYear)) {
            total += expense.amount;
        }
    });

    document.getElementById("yearlyReport").innerHTML =
        "Yearly Expense: ₹ " + total;
}

function clearFields() {
    document.getElementById("date").value = "";
    document.getElementById("category").value = "";
    document.getElementById("description").value = "";
    document.getElementById("amount").value = "";
}

displayExpenses();
</script>

</body>
</html>
